# Arc 7E: Coach — Deterministic Implementation Guidance
# Marcus gets evidence-cited implementation advice from the symbol graph,
# structural trust, and ECL history.

scenario:
  id: arc-7e-coach-implementation
  name: "Coach — Deterministic Implementation Guidance"
  arc: 7
  sub_arc: E
  description: >
    Marcus opens a PR to add a new webhook event type. The Cross-Layer Coach
    resolves targets from the symbol graph, references structural trust
    (wiring neighborhoods), cites ECL history, and produces an ordered
    implementation plan with evidence strings.

  actors:
    - id: marcus
      github_user: marcus-webb-acme
      role: mid

  prerequisites:
    - arc_7a_completed: true
      description: "Golden patterns must exist for coach to reference"

  steps:
    - action: create_branch
      actor: marcus
      branch: feat/webhook-event-types
      from: main

    - action: commit
      actor: marcus
      branch: feat/webhook-event-types
      message: "feat(webhooks): add order.completed event type"
      files:
        - path: services/webhooks/events/order-completed.ts
          template: webhook-event
          traits: [event_handler, partial_validation]
        - path: services/webhooks/dispatcher/index.ts
          template: dispatcher-update
          traits: [new_event_registration]

    - action: open_pr
      actor: marcus
      branch: feat/webhook-event-types
      title: "feat(webhooks): add order.completed event type"
      body: "Adds new webhook event type for order completion notifications."
      labels: [webhooks, feature]

    # Coach resolves targets and produces plan
    - action: await_workflow
      workflow: codeledger-pr.yml
      expected_status: warn
      capture:
        - name: coach_output
          description: "Coach plan with evidence-cited advice"
      expected_output:
        intent: "add order.completed webhook event type"
        resolved_targets_min: 5
        context_sufficient: true
        advice_includes:
          - severity: warn
            source: ECL
            pattern: "2 prior webhook PRs had retry issues"
          - severity: info
            source: structural-trust
            pattern: "dispatcher must import from shared retry"
          - severity: info
            source: golden-pattern
            pattern: "GP-005 Retry with Backoff Pattern"
        plan_step_count_min: 3

  expected_signals:
    coach_produced: true
    symbol_graph_resolved: true
    ecl_history_cited: true
    golden_pattern_referenced: "GP-005"
    structural_trust_checked: true

  narrative:
    headline: "Evidence-cited implementation plan from three intelligence layers"
    detail: >
      The Cross-Layer Coach fuses three sources: the symbol graph (which
      files are structurally relevant), ECL history (Marcus's 2 prior
      webhook PRs had retry issues), and structural trust (the dispatcher
      must use shared retry per immutable wire). The result is an ordered
      plan that cites evidence for every suggestion — no guessing.
