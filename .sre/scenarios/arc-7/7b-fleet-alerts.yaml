# Arc 7B: Fleet Alerts — Cross-Repo Risk Spike
# A dependency update triggers multiple WARN findings. Fleet alert system
# detects RISK_SPIKE across the org.

scenario:
  id: arc-7b-fleet-alerts
  name: "Fleet Alerts — Cross-Repo Risk Spike"
  arc: 7
  sub_arc: B
  description: >
    Demonstrates fleet-level risk detection. A shared dependency update
    causes WARN findings to spike across acme-platform. The fleet alert
    system detects the concentration and fires a RISK_SPIKE alert visible
    in the dashboard.

  actors:
    - id: marcus
      github_user: marcus-webb-acme
      role: mid

  prerequisites:
    - fleet_manifest: .codeledger/fleet/manifest.json
      repos:
        - acme-platform
        - acme-internal-tools
        - acme-data-pipeline

  steps:
    - action: create_branch
      actor: marcus
      branch: chore/update-shared-deps
      from: main

    - action: commit
      actor: marcus
      branch: chore/update-shared-deps
      message: "chore: update shared-utils retry and error modules"
      files:
        - path: packages/shared-utils/src/retry.ts
          template: shared-util
          traits: [breaking_signature_change]
        - path: packages/shared-utils/src/errors.ts
          template: shared-util
          traits: [breaking_signature_change]

    - action: open_pr
      actor: marcus
      branch: chore/update-shared-deps
      title: "chore: update shared-utils retry and error modules"
      body: >
        Updates retry and error utility signatures to support new
        error categorization. Breaking change to shared package API.
      labels: [infrastructure, breaking-change]

    # CodeLedger detects multiple findings due to blast radius
    - action: await_workflow
      workflow: codeledger-pr.yml
      expected_status: warn
      capture:
        - name: verify_findings
          description: "Multiple P1/P2 findings across services consuming shared-utils"

    # Run fleet alerts to detect the spike
    - action: run_codeledger
      command: "fleet alerts --json"
      capture:
        - name: fleet_alert
          description: "RISK_SPIKE alert with severity HIGH"

    - action: run_codeledger
      command: "fleet status --json"
      capture:
        - name: fleet_status
          description: "Fleet status showing acme-platform at elevated risk"

  expected_signals:
    alert_type: "RISK_SPIKE"
    alert_severity: "HIGH"
    affected_services:
      - services/auth/
      - services/billing/
      - services/notifications/
      - services/webhooks/
    blast_radius_files: 12
    fleet_repos_affected: 1

  narrative:
    headline: "Shared dependency update triggers org-wide risk spike"
    detail: >
      This scenario demonstrates fleet-level situational awareness. When
      Marcus updates a shared utility package, CodeLedger's blast radius
      analysis detects that 4 services are affected. The fleet alert
      system fires a RISK_SPIKE because the WARN concentration exceeds
      the threshold. All detection is deterministic — no ML models.
