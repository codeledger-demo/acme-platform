name: Update CodeLedger CLI

# Fires when codeledger-blackbox's release-dispatch.yml sends a
# repository_dispatch event after a successful release.
#
# What it does:
#   1. Installs the newly released @codeledger/cli from npm
#   2. Runs `codeledger init --force` to re-vendor the standalone binary
#   3. Opens a PR with the updated .codeledger/bin/ files
#
# The resulting PR keeps .codeledger/bin/codeledger-standalone.cjs in sync
# with every release so the codeledger-post-merge.yml workflow always has
# access to the latest capture-merge-memory and other commands.

on:
  repository_dispatch:
    types: [codeledger-release]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-cli:
    name: Vendor codeledger v${{ github.event.client_payload.version }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install released CLI version
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          echo "Installing @codeledger/cli@${VERSION}"
          npm install -g "@codeledger/cli@${VERSION}"
          codeledger --version

      - name: Vendor standalone into repo
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          # init --force re-vendors the standalone from the globally installed CLI
          codeledger init --force
          echo "Vendored codeledger v${VERSION} into .codeledger/bin/"

      - name: Open PR with updated vendored CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          BRANCH="chore/codeledger-cli-v${VERSION}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout -b "$BRANCH"
          git add .codeledger/bin/ .gitignore
          git diff --cached --quiet && echo "No CLI changes — skipping PR" && exit 0

          git commit -m "chore: vendor codeledger CLI v${VERSION}"
          git push origin "$BRANCH"

          gh pr create \
            --title "chore: vendor codeledger CLI v${VERSION}" \
            --base main \
            --head "$BRANCH" \
            --body "$(cat <<EOF
## Summary

Automatic CLI vendor update triggered by codeledger-blackbox release v${VERSION}.

Updates \`.codeledger/bin/codeledger-standalone.cjs\` so the
\`codeledger-post-merge.yml\` workflow has access to all commands
shipped in v${VERSION} (including any new features like \`capture-merge-memory\`).

**Triggered by:** \`codeledger-release\` repository dispatch from codeledgerECF/codeledger-blackbox

🤖 Auto-generated by the \`codeledger-cli-update\` workflow.
EOF
)"
