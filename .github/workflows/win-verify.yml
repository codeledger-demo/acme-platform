name: Win Verify
on: [workflow_dispatch]
jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g pnpm@9 codeledger@latest
      - run: pnpm install --no-frozen-lockfile
      - name: Environment
        run: |
          echo "Node: $(node --version)"
          echo "Arch: $env:PROCESSOR_ARCHITECTURE"
          echo "Platform: $(node -e 'console.log(process.platform + \"-\" + process.arch)')"
      - name: Init + Scan
        run: |
          npx codeledger init --force
          npx codeledger scan
      - name: Explicit activation
        run: npx codeledger activate --task "Fix authentication middleware in packages/api/src/auth" --quiet
      - name: Lifecycle record
        run: |
          node -e "const fs=require('fs'),p=require('path').join('.codeledger','task-lifecycle.jsonl');if(!fs.existsSync(p)){console.log('LIFECYCLE: not found (ok for published version)');process.exit(0);}const l=fs.readFileSync(p,'utf8').trim().split(/\r?\n/);console.log('Records:',l.length);const r=JSON.parse(l[l.length-1]);console.log('Phase:',r.phase,'TaskID:',r.task_id||r.activation?.task_id)"
      - name: Task status
        run: npx codeledger task status --json 2>$null || echo "task status not in published version"
      - name: Bundle
        run: npx codeledger bundle --task "Add error handling to API router" --json 2>$null | Select-Object -First 3
      - name: Session summary
        run: npx codeledger session-summary
      - name: Repeated init
        run: npx codeledger init
      - name: better-sqlite3 native addon
        run: |
          node -e "try{const d=require('better-sqlite3')(':memory:');d.exec('CREATE TABLE t(id INTEGER PRIMARY KEY,v TEXT)');d.prepare('INSERT INTO t(v) VALUES(?)').run('win');console.log(d.prepare('SELECT v FROM t').get().v);d.close();console.log('SQLITE: PASS')}catch(e){console.log('SQLITE:',e.message);process.exit(1)}"
      - name: CRLF test
        run: |
          node -e "const fs=require('fs'),p=require('path').join('.codeledger','crlf-test.jsonl');fs.writeFileSync(p,'{\"a\":1}\r\n{\"b\":2}\r\n');const l=fs.readFileSync(p,'utf8').trim().split(/\r?\n/).filter(Boolean);if(l.length!==2){process.exit(1)}for(const x of l)JSON.parse(x);console.log('CRLF: PASS');fs.unlinkSync(p)"
      - name: Summary
        if: always()
        run: echo "=== Windows Verification Complete ==="
