name: Win Verify
on: [workflow_dispatch]
jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g pnpm@9 codeledger@latest
      - run: pnpm install --no-frozen-lockfile
      - name: Environment
        shell: cmd
        run: |
          echo Node: & node --version
          echo Platform: & node -e "console.log(process.platform + '-' + process.arch)"
      - name: Init + Scan
        shell: cmd
        run: |
          npx codeledger init --force
          npx codeledger scan
      - name: Explicit activation
        shell: cmd
        run: npx codeledger activate --task "Fix authentication middleware in packages/api/src/auth" --quiet
      - name: Lifecycle record
        shell: cmd
        run: node -e "var fs=require('fs'),p=require('path').join('.codeledger','task-lifecycle.jsonl');if(!fs.existsSync(p)){console.log('LIFECYCLE: not found');process.exit(0);}var l=fs.readFileSync(p,'utf8').trim().split(/\r?\n/);console.log('Records:',l.length);var r=JSON.parse(l[l.length-1]);console.log('Phase:',r.phase,'TaskID:',r.task_id||'embedded')"
      - name: Task status
        shell: cmd
        run: npx codeledger task status --json || echo task status not available
      - name: Bundle
        shell: cmd
        run: npx codeledger bundle --task "Add error handling to API router" --json > /dev/null 2>&1 && echo BUNDLE: PASS || echo BUNDLE: FAIL
      - name: Session summary
        shell: cmd
        run: npx codeledger session-summary
      - name: Repeated init
        shell: cmd
        run: npx codeledger init && echo IDEMPOTENT: PASS
      - name: better-sqlite3 native addon
        shell: cmd
        run: node -e "try{var d=require('better-sqlite3')(':memory:');d.exec('CREATE TABLE t(id INTEGER PRIMARY KEY,v TEXT)');d.prepare('INSERT INTO t(v) VALUES(?)').run('win');console.log(d.prepare('SELECT v FROM t').get().v);d.close();console.log('SQLITE: PASS')}catch(e){console.log('SQLITE:',e.message);process.exit(1)}"
      - name: CRLF test
        shell: cmd
        run: node -e "var fs=require('fs'),p=require('path').join('.codeledger','crlf-test.jsonl');fs.writeFileSync(p,'{\"a\":1}\r\n{\"b\":2}\r\n');var l=fs.readFileSync(p,'utf8').trim().split(/\r?\n/).filter(Boolean);if(l.length!==2){process.exit(1);}for(var i=0;i<l.length;i++)JSON.parse(l[i]);console.log('CRLF: PASS');fs.unlinkSync(p)"
      - name: Summary
        if: always()
        shell: cmd
        run: echo === Windows Verification Complete ===
