name: CodeLedger PR Analysis

# Real CodeLedger analysis on every PR.
# Uses the vendored standalone CLI at .codeledger/bin/ — no npm install needed.
# Each step writes JSON output, which is composed into a rich PR comment.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify vendored CLI
        run: |
          node .codeledger/bin/codeledger-standalone.cjs --version

      - name: Initialize CodeLedger (preserve seeded state)
        run: |
          if [ ! -f .codeledger/config.json ]; then
            node .codeledger/bin/codeledger-standalone.cjs init --force 2>&1 || true
          else
            echo "CodeLedger already initialized — using seeded state"
          fi

      - name: Scan repo
        run: |
          node .codeledger/bin/codeledger-standalone.cjs scan 2>&1 || true

      - name: Activate context bundle
        run: |
          node .codeledger/bin/codeledger-standalone.cjs activate \
            --task "${{ github.event.pull_request.title }}" 2>&1 || true

      - name: Run Verify
        run: |
          node .codeledger/bin/codeledger-standalone.cjs verify \
            --json --explain \
            > codeledger-verify.json 2>&1 || echo '{"error":"verify unavailable"}' > codeledger-verify.json

      - name: Collect Truth Basis
        run: |
          node .codeledger/bin/codeledger-standalone.cjs truth \
            --panel-json \
            > codeledger-truth.json 2>&1 || echo '{"error":"truth unavailable"}' > codeledger-truth.json

      - name: Run Explain (Phase 2)
        run: |
          node .codeledger/bin/codeledger-standalone.cjs explain \
            --json --surface ci \
            > codeledger-explain.json 2>&1 || echo '{"error":"explain unavailable"}' > codeledger-explain.json

      - name: Run Next Actions (Phase 2)
        run: |
          node .codeledger/bin/codeledger-standalone.cjs next \
            --json --limit 3 \
            > codeledger-next.json 2>&1 || echo '{"error":"next unavailable"}' > codeledger-next.json

      - name: Run Coach
        run: |
          node .codeledger/bin/codeledger-standalone.cjs coach \
            --intent "${{ github.event.pull_request.title }}" \
            --json \
            > codeledger-coach.json 2>&1 || echo '{"error":"coach unavailable"}' > codeledger-coach.json

      - name: Build composite PR comment
        continue-on-error: true
        run: |
          node .github/scripts/build-pr-comment.mjs \
            --verify codeledger-verify.json \
            --truth codeledger-truth.json \
            --explain codeledger-explain.json \
            --next codeledger-next.json \
            --coach codeledger-coach.json \
            --pr-title "${{ github.event.pull_request.title }}" \
            --pr-author "${{ github.event.pull_request.user.login }}" \
            --pr-branch "${{ github.event.pull_request.head.ref }}" \
            --out codeledger-pr-body.md

      - name: Post or update PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- codeledger:pr-analysis -->';

            let body;
            try {
              body = fs.readFileSync('codeledger-pr-body.md', 'utf8');
            } catch {
              body = marker + '\n## 🔎 CodeLedger PR Analysis\n\n> Analysis artifacts were not generated. Check the workflow logs.\n';
            }

            // Find existing comment to update (dedup)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });

            const existing = comments.find(c => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeledger-analysis-pr-${{ github.event.pull_request.number }}
          path: codeledger-*.json
          retention-days: 30
