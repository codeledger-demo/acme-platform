name: CodeLedger Context Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  codeledger:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install CodeLedger
        run: npm install -g @codeledger/cli

      - name: Run Context Validation
        run: |
          codeledger context validate --json > result.json

      - name: Parse Result
        id: parse
        run: |
          cat result.json
          node -e "
            const r = require('./result.json');
            console.log('ccs=' + r.ccs.score);
            console.log('decision=' + r.ccs.decision);
            console.log('isc=' + r.isc.decision);
          " >> $GITHUB_OUTPUT

      - name: Fail on BLOCK
        if: steps.parse.outputs.decision == 'BLOCK'
        run: |
          echo "CodeLedger blocked execution due to low context confidence"
          exit 1

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const r = JSON.parse(fs.readFileSync('result.json', 'utf8'));

            const body = `
## 🔍 CodeLedger Context Analysis

**Intent Sufficiency:** ${r.isc.score} (${r.isc.decision})  
**Context Confidence:** ${r.ccs.score} (${r.ccs.decision})

### Issues
${(r.ccs.issues || []).map(i => `- ${i}`).join('\n')}

### Suggestions
${(r.ccs.suggestions || []).map(s => `- ${s}`).join('\n')}

---
Powered by CodeLedger — Deterministic Context Control Plane
`;

            github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body
            });
