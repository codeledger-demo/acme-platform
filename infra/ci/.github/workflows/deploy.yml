name: Deploy

on:
  push:
    branches: [main]
    tags: ['v*']

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref == 'refs/heads/main' && 'staging' || 'production' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          IMAGE_TAG="${{ github.sha }}"
          docker build -t ${{ secrets.ECR_REGISTRY }}/acme-api:${IMAGE_TAG} .
          docker push ${{ secrets.ECR_REGISTRY }}/acme-api:${IMAGE_TAG}

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster acme-${{ github.ref == 'refs/heads/main' && 'staging' || 'production' }} \
            --service acme-${{ github.ref == 'refs/heads/main' && 'staging' || 'production' }}-api \
            --force-new-deployment
