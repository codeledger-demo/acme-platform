apiVersion: apps/v1
kind: Deployment
metadata:
  name: acme-platform
  labels:
    app: acme-platform
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: acme-platform
  template:
    metadata:
      labels:
        app: acme-platform
        tier: backend
    spec:
      containers:
        - name: api
          image: acme-platform/api:latest
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: acme-config
                  key: NODE_ENV
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: acme-secrets
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
